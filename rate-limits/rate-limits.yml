rateLimits:
  - api: Electrify America Partner APIs (Stations, Availability, Pricing, Sessions)
    description: >-
      Electrify America's partner-facing REST APIs are protected by OAuth2
      (Auth0) and are available only to approved partner integrators and
      automotive OEMs. No public rate limit policy has been published; specific
      throttling thresholds, burst limits, and quota allocations are defined
      per partner agreement and communicated through the developer portal at
      developer.electrifyamerica.com. Partners should implement exponential
      backoff for HTTP 429 responses and cache station and pricing data where
      real-time freshness is not required.
    authentication: OAuth2 (Auth0) — partner credentials required
    publicRateLimit: not publicly documented
    notes:
      - Rate limits are contract-defined per OEM / partner integration
      - Real-time availability polling should be paced to avoid abuse
      - HTTP 429 (Too Many Requests) is expected response for over-limit calls
      - OAuth2 access tokens are scoped per integration type
    url: https://developer.electrifyamerica.com/

  - api: Electrify America Station Locator (Consumer Web / App)
    description: >-
      The consumer-facing station locator at electrifyamerica.com/locate-charger
      and the Electrify America mobile app do not expose a public API. Station
      data and availability visible in the app is served through internal
      endpoints not intended for third-party programmatic access. No publicly
      documented rate limits apply to the consumer interfaces.
    authentication: none (consumer web/app); OAuth2 for internal mobile app backend
    publicRateLimit: not applicable — no public API
    notes:
      - Third-party scraping of the station locator is not officially supported
      - NREL Alternative Fuel Stations API (developer.nlr.gov) provides publicly
        accessible US EV station data including Electrify America locations
    url: https://www.electrifyamerica.com/locate-charger/
